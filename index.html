<!DOCTYPE html>
<html lang="pt-Br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prime Veiculos - Escolha certa</title>
  <style>
    body {
        background: linear-gradient(135deg, #121212 0%, #2c2c2c 100%);
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        text-align: center;
        margin: 0;
        padding: 20px;
    
    }

    .logo {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 100px; 
        height: auto;
    }

    .banner {
        max-width: 800px;
        width: 100%;
        height: auto;
        border-radius: 10px;
        display: block;
        margin: 40px auto; 
    }

    .carros {
        text-align: center;
        padding: 20px;
    }

    .carrofotos {
        display: inline-block;
        width: 250px;
        height: 250px;
        margin: 10px;
        object-fit: cover;
        border-radius: 10px;
        border: 3px solid #fff; 
        vertical-align: top;
      
    }

    .carrofotos:hover {
        border-color: #8a2be2; 
        transform: scale(1.05); 
        box-shadow: 0 0 20px #8a2be2; 
        cursor: pointer;
    }

    .formulario {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 40px;
        margin: 40px auto;
        max-width: 400px;
        border-radius: 20px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
    }

    input, select {
        width: 100%;
        box-sizing: border-box;
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 8px;
        border: 2px solid #444;
        background-color: #1a1a1a;
        color: white;
    }

    button {
        width: 100%;
        background-color: #ffcc00;
        padding: 15px;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
       
    }

    button:hover {
        background-color: #7fe54b; 
        transform: scale(1.02);    
        box-shadow: 0 4px 15px rgba(163, 253, 198, 0.4); 
    }

    .rodape { margin-top: 40px; font-size: 14px; }
  </style>
</head>
<body>

  <img class="logo" src="imagens/Logo-da-Empresa.png" alt="Logo">

  <div class="bannerprincipal">
    <img class="banner" src="imagens/banner.png" alt="Banner">
  </div>
 
  <div class="titulo002">
    <h2>Escolha seu Carro</h2>
    <div class="carros">
        <img src="imagens/Volkswagen T-Cross.png" alt="Volkswagen" class="carrofotos">
        <img src="imagens/Honda HR-V.png" alt="Honda" class="carrofotos">
        <img src="imagens/Hyundai-Tucson.png" alt="Hyundai" class="carrofotos">
        <img src="imagens/Chevrolet Tracker.png" alt="Chevrolet" class="carrofotos">
    </div>
  </div>

  <div class="formulario">
    <h1>FAÇA SUA RESERVA!</h1>
        <form>
            <label for="nome">Qual seu nome?</label><br>
            <input type="text" id="nome" name="nome" placeholder="Jonas amaral ribeiro"><br>
            
            <label for="email">Seu melhor e-mail</label><br>
            <input type="email" id="email" name="email" placeholder="xxxxx@gmail.com"><br>
            
            <label for="tel">Seu WhatsApp</label><br>
            <input type="tel" id="tel" name="tel" placeholder="55 85 00000-0000"><br>
            
            <label for="sede">Selecione seu modelo:</label><br>
            <select id="sede" name="sede">
                <option value="">Selecione...</option>
                <option value="tcross">T-Cross</option>
                <option value="hrv">HR-V</option>
                <option value="tucson">Tucson</option>
                <option value="tracker">Tracker</option>
            </select><br><br>
            
            <button type="submit">SER FELIZ</button>
        </form>
   </div>

   <div class="rodape">
     <h4>Contato</h4>
     <p>Telefone: (85) 9279-0324</p>
     <p>© 2026 Prime Veículos - Todos os direitos reservados.</p>
   </div>

</body>
</html>
